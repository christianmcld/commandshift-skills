<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    background: #0A0A0F;
    font-family: 'Inter', sans-serif;
    color: #F8FAFC;
    overflow: hidden;
  }
  .slide {
    width: 100%; height: 100%;
    padding: 80px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    position: relative;
  }
  .slide::before {
    content: '';
    position: absolute; top: 20%; left: 20%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .recap {
    font-size: 24px; font-weight: 500;
    color: #64748B; margin-bottom: 48px;
    text-transform: uppercase; letter-spacing: 3px;
  }
  .handle {
    font-size: 64px; font-weight: 800;
    letter-spacing: -2px; margin-bottom: 24px;
    background: linear-gradient(135deg, #8B5CF6, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .cta-text {
    font-size: 36px; font-weight: 600;
    line-height: 1.4; margin-bottom: 48px;
  }
  .cta-actions {
    display: flex; gap: 24px;
    flex-wrap: wrap; justify-content: center;
  }
  .cta-pill {
    padding: 16px 36px;
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 100px;
    font-size: 24px; font-weight: 600;
    color: #A78BFA;
  }
  .cta-pill.primary {
    background: linear-gradient(135deg, #8B5CF6, #7C3AED);
    border: none; color: white;
    box-shadow: 0 8px 32px rgba(139,92,246,0.4);
  }
  .comment-cta {
    margin-top: 40px;
    font-size: 26px; color: #64748B;
    font-weight: 500;
  }
  .comment-cta span { color: #A78BFA; font-weight: 700; }
  .slide-number {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 16px; font-weight: 500;
    color: #64748B; letter-spacing: 2px;
  }
  .brand {
    position: absolute; bottom: 40px; left: 80px;
    font-size: 16px; font-weight: 600;
    color: #64748B; letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="slide">
    <p class="recap">Stop chatting. Start building.</p>
    <div class="handle">@commandshift</div>
    <p class="cta-text">Follow for AI automation<br>that actually ships.</p>
    <div class="cta-actions">
      <span class="cta-pill primary">Follow</span>
      <span class="cta-pill">Save</span>
      <span class="cta-pill">Share</span>
    </div>
    <p class="comment-cta">Comment <span>"CLAUDE"</span> and I'll send you the setup guide</p>
    <span class="brand">@commandshift</span>
    <span class="slide-number">08/08</span>
  </div>
</body>
</html>
