<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px;
    background: #0A0A0F;
    font-family: 'Inter', sans-serif;
    color: #F8FAFC;
    overflow: hidden;
  }
  .slide {
    width: 100%; height: 100%;
    padding: 80px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .slide::before {
    content: '';
    position: absolute; top: -30%; right: -30%;
    width: 80%; height: 80%;
    background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .tag {
    display: inline-block;
    padding: 12px 28px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 100px;
    font-size: 22px; font-weight: 600;
    color: #EF4444;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 40px;
    width: fit-content;
  }
  .headline {
    font-size: 72px; font-weight: 800;
    line-height: 1.05; letter-spacing: -3px;
    margin-bottom: 32px;
  }
  .strikethrough {
    text-decoration: line-through;
    color: #EF4444;
    opacity: 0.7;
  }
  .highlight {
    background: linear-gradient(135deg, #8B5CF6, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtext {
    font-size: 30px; font-weight: 400;
    color: #64748B; line-height: 1.5;
  }
  .slide-number {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 16px; font-weight: 500;
    color: #64748B; letter-spacing: 2px;
  }
  .brand {
    position: absolute; bottom: 40px; left: 80px;
    font-size: 16px; font-weight: 600;
    color: #64748B; letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="tag">Hot Take</div>
    <h1 class="headline">Why I Stopped<br>Using <span class="strikethrough">ChatGPT</span><br><span style="font-size:40px;color:#64748B;font-weight:500;letter-spacing:0;">(And You Should Too)</span></h1>
    <p class="subtext">This is not what you think it is. Swipe.</p>
    <span class="brand">@commandshift</span>
    <span class="slide-number">01/08</span>
  </div>
</body>
</html>
